<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduSpell | Interactive Word List</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0A2753;
            --bg-page: #ffffff;
            --card-bg: #f4f7f9;
            --accent-blue: #cce0f5;
            --streak-orange: #FF8C00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 5%;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            z-index: 100;
        }

        .left-nav { display: flex; align-items: center; gap: 12px; }
        .logo-box { background: var(--navy); color: white; padding: 5px 12px; border-radius: 8px; font-weight: 800; }
        .logo-text { font-weight: 800; font-size: 22px; color: var(--navy); }

        .streak-container { text-align: right; }
        .streak-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #fff5eb;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #ffe0b3;
            color: var(--streak-orange);
            font-weight: 800;
        }
        .timer-info { font-size: 10px; color: #888; margin-top: 2px; font-weight: 600; }

        /* Layout Area */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            perspective: 1200px;
        }

        .word-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 40px;
            padding-top: 30px;
            box-shadow: 0 15px 35px rgba(10, 39, 83, 0.1);
            position: relative;
            will-change: transform, opacity;
        }

        .title {
            font-size: 22px;
            font-weight: 800;
            color: var(--navy);
            text-align: center;
            margin-bottom: 20px;
        }

        .dual-list {
            display: flex;
            width: 100%;
            background: white;
            border-radius: 0 0 40px 40px;
            overflow: hidden;
            min-height: 420px;
        }

        .cursive-column { background-color: var(--accent-blue); width: 45%; display: flex; flex-direction: column; align-items: center; padding: 15px 0; }
        .bold-column { width: 55%; display: flex; flex-direction: column; padding: 15px 20px; }
        .word-cursive { font-family: 'Great Vibes', cursive; font-size: 24px; color: #3e5e8a; height: 38px; line-height: 38px; white-space: nowrap; }
        .word-bold { font-size: 20px; font-weight: 800; color: #1a1a1a; height: 38px; line-height: 38px; }

        .page-dots { display: flex; gap: 6px; margin-top: 25px; flex-wrap: wrap; justify-content: center; max-width: 85%; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #ddd; transition: 0.3s; }
        .dot.active { background: var(--navy); width: 16px; border-radius: 10px; }

        .footer-info { font-weight: 800; color: #bbb; margin-top: 10px; }
        .instructions { font-size: 11px; color: #ccc; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }

        /* Goal Reached Notification */
        #goal-popup {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--streak-orange);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 800;
            z-index: 1000;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(255,140,0,0.3);
        }
        #goal-popup.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="goal-popup">🔥 Goal Reached! Streak Updated</div>

    <nav>
        <div class="left-nav">
            <div class="logo-box">E</div>
            <span class="logo-text">EduSpell</span>
        </div>
        <div class="streak-container">
            <div class="streak-badge">
                <span>🔥</span>
                <span id="streak-count">0 Day Streak</span>
            </div>
            <div class="timer-info" id="timer-text">Used today: 0m 0s (Need 5m)</div>
        </div>
    </nav>

    <main id="swipe-area">
        <div class="word-card" id="card">
            <h1 class="title">Let's spell new words</h1>
            <div class="dual-list">
                <div class="cursive-column" id="cursive-side"></div>
                <div class="bold-column" id="bold-side"></div>
            </div>
        </div>
        <div class="page-dots" id="dots-container"></div>
        <div class="footer-info" id="page-num">Page 1</div>
        <p class="instructions">Swipe left or right to flip</p>
    </main>

    <script>
        const allWords = [
            "hospital", "directed", "bicycle", "attending", "cousin", "patient", "drove", "penguins", "entered", "basket",
            "waiting", "nurse", "doctor", "medicine", "floor", "recovery", "crowded", "well-dressed", "reception", "accident",
            "address", "believe", "calendar", "describe", "exercise", "favorite", "government", "imagine", "journey", "beautiful",
            "decide", "environment", "problem", "answer", "customer", "language", "danger", "important", "arrive", "change",
            "energy", "friend", "memory", "create", "attention", "distance", "market", "choose", "example", "future",
            "support", "condition", "listen", "action", "interest", "education", "knowledge", "improve", "travel", "center",
            "information", "system", "natural", "opportunity", "sentence", "school", "business", "people", "question", "article",
            "complete", "reason", "increase", "effect", "history", "health", "movement", "industry", "practice", "result",
            "simple", "strong", "modern", "possible", "difficult", "regular", "special", "general", "different", "common",
            "active", "public", "private", "central", "final", "current", "basic", "clear", "exact", "local",
            "global", "legal", "moral", "social", "political", "scientific", "technical", "physical", "digital", "virtual",
            "mobile", "online", "offline", "network", "device", "software", "hardware", "data", "signal", "image",
            "sound", "voice", "video", "message", "email", "account", "profile", "security", "password", "access",
            "upload", "download", "connect", "disconnect", "install", "update", "delete", "search", "browse", "click",
            "scroll", "enter", "exit", "open", "close", "save", "edit", "copy", "paste", "share",
            "send", "receive", "reply", "forward", "block", "unblock", "report", "follow", "subscribe", "like",
            "comment", "post", "stream", "record"
        ];

        const pages = [];
        for (let i = 0; i < allWords.length; i += 10) pages.push(allWords.slice(i, i + 10));

        let currentPage = parseInt(localStorage.getItem('eduspell_last_page')) || 0;
        const cursiveSide = document.getElementById('cursive-side');
        const boldSide = document.getElementById('bold-side');
        const pageNumDisplay = document.getElementById('page-num');
        const card = document.getElementById('card');
        const dotsContainer = document.getElementById('dots-container');

        // --- STREAK & TIMER LOGIC ---
        const MIN_USE_SECONDS = 300; // 5 मिनट
        let secondsToday = 0;
        let streakCompletedToday = false;

        function initStreak() {
            const today = new Date().toDateString();
            const lastVisit = localStorage.getItem('eduspell_last_date');
            const storedStreak = parseInt(localStorage.getItem('eduspell_streak')) || 0;
            const lastVisitFull = localStorage.getItem('eduspell_last_full_date'); // वो दिन जब 5 मिनट पूरे हुए थे

            // 1. अगर आज नया दिन है, तो आज के सेकंड्स 0 कर दो
            if (lastVisit !== today) {
                localStorage.setItem('usage_seconds_today', 0);
                localStorage.setItem('eduspell_last_date', today);
            }
            
            secondsToday = parseInt(localStorage.getItem('usage_seconds_today')) || 0;

            // 2. मिसिंग डे चेक (Streak Reset Logic)
            if (lastVisitFull) {
                const lastDateObj = new Date(lastVisitFull);
                const todayObj = new Date(today);
                const diffTime = Math.abs(todayObj - lastDateObj);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays > 1) {
                    // अगर 1 दिन से ज्यादा का गैप है, तो स्ट्रीक खत्म
                    localStorage.setItem('eduspell_streak', 0);
                }
            }

            if (lastVisitFull === today) streakCompletedToday = true;

            updateStreakUI();
        }

        function updateStreakUI() {
            const streak = localStorage.getItem('eduspell_streak') || 0;
            document.getElementById('streak-count').textContent = `${streak} Day Streak`;
            
            const mins = Math.floor(secondsToday / 60);
            const secs = secondsToday % 60;
            const timerText = document.getElementById('timer-text');
            
            if (streakCompletedToday) {
                timerText.textContent = "Today's goal finished! ✅";
                timerText.style.color = "green";
            } else {
                timerText.textContent = `Used today: ${mins}m ${secs}s (Need 5m)`;
            }
        }

        // हर सेकंड टाइमर चलाना
        setInterval(() => {
            if (streakCompletedToday) return;

            secondsToday++;
            localStorage.setItem('usage_seconds_today', secondsToday);
            updateStreakUI();

            if (secondsToday >= MIN_USE_SECONDS) {
                completeStreak();
            }
        }, 1000);

        function completeStreak() {
            streakCompletedToday = true;
            let streak = parseInt(localStorage.getItem('eduspell_streak')) || 0;
            streak++;
            localStorage.setItem('eduspell_streak', streak);
            localStorage.setItem('eduspell_last_full_date', new Date().toDateString());
            
            updateStreakUI();
            
            // Popup दिखाना
            const popup = document.getElementById('goal-popup');
            popup.classList.add('show');
            setTimeout(() => popup.classList.remove('show'), 3000);
        }

        // --- RENDER & SWIPE LOGIC ---
        function createDots() {
            dotsContainer.innerHTML = "";
            pages.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'dot' + (i === currentPage ? ' active' : '');
                dotsContainer.appendChild(dot);
            });
        }

        function renderWords(index) {
            cursiveSide.innerHTML = ""; boldSide.innerHTML = "";
            pages[index].forEach(word => {
                const cDiv = document.createElement('div'); cDiv.className = 'word-cursive'; cDiv.textContent = word;
                cursiveSide.appendChild(cDiv);
                const bDiv = document.createElement('div'); bDiv.className = 'word-bold'; bDiv.textContent = word;
                boldSide.appendChild(bDiv);
            });
            pageNumDisplay.textContent = `Page ${index + 1} of ${pages.length}`;
            const allDots = document.querySelectorAll('.dot');
            allDots.forEach((dot, i) => dot.classList.toggle('active', i === index));
            localStorage.setItem('eduspell_last_page', index);
        }

        let startX = 0, currentX = 0, isDragging = false;
        card.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; isDragging = true; card.style.transition = 'none'; });
        card.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            currentX = e.touches[0].clientX;
            const diff = currentX - startX;
            card.style.transform = `translateX(${diff}px) rotate(${diff/25}deg)`;
        });
        card.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;
            const diff = currentX - startX;
            if (Math.abs(diff) > 100) {
                if (diff < 0 && currentPage < pages.length - 1) shiftPage(1);
                else if (diff > 0 && currentPage > 0) shiftPage(-1);
                else resetPosition();
            } else resetPosition();
        });

        function resetPosition() {
            card.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            card.style.transform = `translateX(0px) rotate(0deg)`;
        }

        function shiftPage(dir) {
            card.style.transition = 'transform 0.3s ease-in, opacity 0.3s';
            card.style.transform = `translateX(${-dir * window.innerWidth}px) rotate(${-dir * 20}deg)`;
            card.style.opacity = '0';
            setTimeout(() => {
                currentPage += dir;
                renderWords(currentPage);
                card.style.transition = 'none';
                card.style.transform = `translateX(${dir * window.innerWidth}px) rotate(${dir * 20}deg)`;
                requestAnimationFrame(() => {
                    card.style.transition = 'transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.5s';
                    card.style.transform = `translateX(0px) rotate(0deg)`;
                    card.style.opacity = '1';
                });
            }, 300);
        }

        window.onload = () => {
            initStreak();
            createDots();
            renderWords(currentPage);
        };
    </script>
</body>
</html>
